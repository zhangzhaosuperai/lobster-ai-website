<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 龙虾科技</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'lobster-dark': '#0A1628',
                        'lobster-red': '#FF4D4D',
                        'lobster-coral': '#FF6B4A',
                        'lobster-blue': '#00D4FF',
                    },
                    fontFamily: {
                        sans: ['Noto Sans SC', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .sidebar-item {
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }
        .sidebar-item:hover, .sidebar-item.active {
            background: rgba(255, 77, 77, 0.2);
            border-left: 3px solid #FF4D4D;
        }
        /* Chart container styles - Fixed */
        .chart-wrapper {
            position: relative;
            height: 280px;
            width: 100%;
            min-height: 280px;
        }
        .chart-canvas {
            max-height: 280px !important;
        }
        /* Prevent layout shift */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
        }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.5rem;
        }
        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-lobster-dark text-white font-sans antialiased">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-[#050d1a] border-r border-white/10 flex-shrink-0 flex flex-col overflow-hidden">
            <div class="p-6 border-b border-white/10 flex-shrink-0">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-lobster-red to-lobster-coral flex items-center justify-center text-lg flex-shrink-0">
                        🦞
                    </div>
                    <div class="min-w-0">
                        <h1 class="font-bold text-white text-sm truncate">龙虾科技</h1>
                        <p class="text-xs text-gray-400">管理后台</p>
                    </div>
                </div>
            </div>
            
            <nav class="flex-1 py-4 overflow-y-auto overflow-x-hidden">
                <div class="px-4 mb-2 text-xs text-gray-500 uppercase tracking-wider">主菜单</div>
                <a href="#" class="sidebar-item active flex items-center gap-3 px-4 py-3 text-white text-sm">
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
                    </svg>
                    <span class="truncate">仪表盘</span>
                </a>
                <a href="#" class="sidebar-item flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white text-sm">
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
                    </svg>
                    <span class="truncate">项目管理</span>
                </a>
                <a href="#" class="sidebar-item flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white text-sm">
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>
                    <span class="truncate">客户管理</span>
                </a>
                <a href="#" class="sidebar-item flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white text-sm">
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"/>
                    </svg>
                    <span class="truncate">数据统计</span>
                </a>

                <div class="px-4 mt-8 mb-2 text-xs text-gray-500 uppercase tracking-wider">系统</div>
                <a href="#" class="sidebar-item flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white text-sm">
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    <span class="truncate">系统设置</span>
                </a>
                <a href="/admin/login.html" onclick="logout()" class="sidebar-item flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-lobster-red text-sm">
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                    <span class="truncate">退出登录</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto overflow-x-hidden bg-lobster-dark">
            <!-- Header -->
            <header class="bg-[#0d1b2a]/80 backdrop-blur-lg border-b border-white/10 sticky top-0 z-40">
                <div class="flex items-center justify-between px-6 py-4">
                    <div class="flex items-center gap-4">
                        <button class="lg:hidden text-gray-400 hover:text-white">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                            </svg>
                        </button>
                        <h2 class="text-xl font-semibold text-white">仪表盘</h2>
                    </div>
                    <div class="flex items-center gap-4">
                        <!-- Search -->
                        <div class="hidden md:flex items-center bg-white/5 rounded-lg px-3 py-2">
                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                            </svg>
                            <input type="text" placeholder="搜索..." class="bg-transparent border-none outline-none text-sm text-white ml-2 w-48 placeholder-gray-500">
                        </div>
                        <!-- Notifications -->
                        <button class="relative p-2 text-gray-400 hover:text-white transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                            </svg>
                            <span class="absolute top-1 right-1 w-2 h-2 bg-lobster-red rounded-full"></span>
                        </button>
                        <!-- User Profile -->
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-lobster-red to-lobster-coral flex items-center justify-center text-white text-sm font-bold">
                                A
                            </div>
                            <div class="hidden md:block">
                                <p class="text-sm font-medium text-white">管理员</p>
                                <p class="text-xs text-gray-400">admin@lobsterai.tech</p>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Dashboard Content -->
            <div class="p-6">
                <!-- Stats Cards -->
                <div class="stats-grid mb-6">
                    <div class="glass-card rounded-xl p-5">
                        <div class="flex items-center justify-between mb-3">
                            <div class="w-10 h-10 rounded-lg bg-lobster-red/20 flex items-center justify-center">
                                <svg class="w-5 h-5 text-lobster-red" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
                                </svg>
                            </div>
                            <span class="text-emerald-400 text-xs font-medium">+12%</span>
                        </div>
                        <h3 class="text-2xl font-bold text-white mb-1">24</h3>
                        <p class="text-gray-400 text-sm">进行中的项目</p>
                    </div>

                    <div class="glass-card rounded-xl p-5">
                        <div class="flex items-center justify-between mb-3">
                            <div class="w-10 h-10 rounded-lg bg-lobster-blue/20 flex items-center justify-center">
                                <svg class="w-5 h-5 text-lobster-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
                                </svg>
                            </div>
                            <span class="text-emerald-400 text-xs font-medium">+8%</span>
                        </div>
                        <h3 class="text-2xl font-bold text-white mb-1">156</h3>
                        <p class="text-gray-400 text-sm">总客户数</p>
                    </div>

                    <div class="glass-card rounded-xl p-5">
                        <div class="flex items-center justify-between mb-3">
                            <div class="w-10 h-10 rounded-lg bg-emerald-500/20 flex items-center justify-center">
                                <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                </svg>
                            </div>
                            <span class="text-emerald-400 text-xs font-medium">+23%</span>
                        </div>
                        <h3 class="text-2xl font-bold text-white mb-1">89</h3>
                        <p class="text-gray-400 text-sm">已完成项目</p>
                    </div>

                    <div class="glass-card rounded-xl p-5">
                        <div class="flex items-center justify-between mb-3">
                            <div class="w-10 h-10 rounded-lg bg-purple-500/20 flex items-center justify-center">
                                <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                </svg>
                            </div>
                            <span class="text-emerald-400 text-xs font-medium">+15%</span>
                        </div>
                        <h3 class="text-2xl font-bold text-white mb-1">¥2.4M</h3>
                        <p class="text-gray-400 text-sm">本月收入</p>
                    </div>
                </div>

                <!-- Charts Row -->
                <div class="charts-grid mb-6">
                    <div class="glass-card rounded-xl p-5">
                        <h3 class="text-lg font-semibold text-white mb-4">项目进展</h3>
                        <div class="chart-wrapper">
                            <canvas id="projectChart" class="chart-canvas"></canvas>
                        </div>
                    </div>
                    <div class="glass-card rounded-xl p-5">
                        <h3 class="text-lg font-semibold text-white mb-4">收入趋势</h3>
                        <div class="chart-wrapper">
                            <canvas id="revenueChart" class="chart-canvas"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Recent Activity -->
                <div class="glass-card rounded-xl p-5">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-semibold text-white">最近动态</h3>
                        <a href="#" class="text-lobster-red text-sm hover:text-lobster-coral transition-colors">查看全部</a>
                    </div>
                    <div class="space-y-3">
                        <div class="flex items-center gap-3 p-3 bg-white/5 rounded-lg">
                            <div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0">
                                <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                                </svg>
                            </div>
                            <div class="min-w-0 flex-1">
                                <p class="text-white text-sm font-medium truncate">项目 "智能客服系统" 已完成</p>
                                <p class="text-gray-400 text-xs">2小时前</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3 p-3 bg-white/5 rounded-lg">
                            <div class="w-8 h-8 rounded-full bg-lobster-blue/20 flex items-center justify-center flex-shrink-0">
                                <svg class="w-4 h-4 text-lobster-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                                </svg>
                            </div>
                            <div class="min-w-0 flex-1">
                                <p class="text-white text-sm font-medium truncate">新项目 "数据分析平台" 已创建</p>
                                <p class="text-gray-400 text-xs">5小时前</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3 p-3 bg-white/5 rounded-lg">
                            <div class="w-8 h-8 rounded-full bg-purple-500/20 flex items-center justify-center flex-shrink-0">
                                <svg class="w-4 h-4 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                                </svg>
                            </div>
                            <div class="min-w-0 flex-1">
                                <p class="text-white text-sm font-medium truncate">新客户 "科技有限公司" 已注册</p>
                                <p class="text-gray-400 text-xs">昨天</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Check login status
        if (!localStorage.getItem('adminLoggedIn')) {
            window.location.href = '/admin/login.html';
        }

        // Logout function
        function logout() {
            localStorage.removeItem('adminLoggedIn');
            window.location.href = '/admin/login.html';
        }

        // Chart configuration with fixed sizing
        Chart.defaults.color = '#9CA3AF';
        Chart.defaults.borderColor = 'rgba(255, 255, 255, 0.05)';
        
        // Project Chart - Fixed doughnut
        const projectCtx = document.getElementById('projectChart');
        if (projectCtx) {
            new Chart(projectCtx, {
                type: 'doughnut',
                data: {
                    labels: ['进行中', '已完成', '待启动'],
                    datasets: [{
                        data: [24, 89, 12],
                        backgroundColor: ['#00D4FF', '#10B981', '#6B7280'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '65%',
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { 
                                color: '#9CA3AF', 
                                padding: 15,
                                usePointStyle: true,
                                pointStyle: 'circle'
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(10, 22, 40, 0.9)',
                            padding: 12,
                            cornerRadius: 8,
                            borderColor: 'rgba(255, 255, 255, 0.1)',
                            borderWidth: 1
                        }
                    }
                }
            });
        }

        // Revenue Chart - Fixed line
        const revenueCtx = document.getElementById('revenueChart');
        if (revenueCtx) {
            new Chart(revenueCtx, {
                type: 'line',
                data: {
                    labels: ['1月', '2月', '3月', '4月', '5月', '6月'],
                    datasets: [{
                        label: '收入 (万元)',
                        data: [180, 195, 210, 205, 230, 240],
                        borderColor: '#FF4D4D',
                        backgroundColor: (context) => {
                            const ctx = context.chart.ctx;
                            const gradient = ctx.createLinearGradient(0, 0, 0, 280);
                            gradient.addColorStop(0, 'rgba(255, 77, 77, 0.3)');
                            gradient.addColorStop(1, 'rgba(255, 77, 77, 0)');
                            return gradient;
                        },
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        pointBackgroundColor: '#FF4D4D',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    },
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(10, 22, 40, 0.9)',
                            padding: 12,
                            cornerRadius: 8,
                            borderColor: 'rgba(255, 255, 255, 0.1)',
                            borderWidth: 1,
                            callbacks: {
                                label: function(context) {
                                    return context.parsed.y + ' 万元';
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { 
                                display: false
                            },
                            ticks: { 
                                color: '#9CA3AF',
                                font: {
                                    size: 11
                                }
                            }
                        },
                        y: {
                            beginAtZero: false,
                            grid: { 
                                color: 'rgba(255, 255, 255, 0.05)',
                                drawBorder: false
                            },
                            ticks: { 
                                color: '#9CA3AF',
                                font: {
                                    size: 11
                                },
                                callback: function(value) {
                                    return value;
                                }
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
